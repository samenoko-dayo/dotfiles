<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Inter</family> <family>Noto Sans JP</family>
        </prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>GeistMono Nerd Font Mono</family> <family>Noto Sans JP</family>
        </prefer>
    </alias>
</fontconfig>